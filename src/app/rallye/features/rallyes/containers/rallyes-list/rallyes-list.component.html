<div class="table-header">
  <h2>Liste des rallyes</h2>
  <button mat-fab color="primary" aria-label="Ajouter rallye" (click)="onAddRallye()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<table mat-table [dataSource]="rallyes()" class="mat-elevation-z8">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Nom </th>
    <td mat-cell *matCellDef="let rallye"> {{rallye.name}} </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let rallye"> 
        <button mat-fab color="primary" (click)="continueRallye(rallye.id)">
            <mat-icon>arrow_forward</mat-icon>
        </button> 
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
