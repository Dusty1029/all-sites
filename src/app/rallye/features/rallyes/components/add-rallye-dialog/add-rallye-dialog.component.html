<h2 mat-dialog-title>Créer un rallye</h2>
<mat-dialog-content [formGroup]="form">
    <mat-form-field appearance="fill" class="full-width">
        <mat-label>Nom</mat-label>
        <input matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field appearance="fill" class="full-width">
        <mat-label>Joueurs</mat-label>
        <mat-select formControlName="playerIds" multiple>
            @for(player of data.players; track player.id) {
            <mat-option [value]="player.id">
                {{ player.name }}
            </mat-option>
            }
        </mat-select>
    </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="close()">Annuler</button>
    <button mat-button color="primary" (click)="submit()" [disabled]="form.invalid">Valider</button>
</mat-dialog-actions>
