<div class="table-header">
  <h2>Liste des jeux</h2>
  <button mat-fab color="primary" aria-label="Ajouter joueur" (click)="onAddGame()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<table mat-table [dataSource]="games()" class="mat-elevation-z8">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Nom </th>
    <td mat-cell *matCellDef="let player"> {{player.name}} </td>
  </ng-container>

  <ng-container matColumnDef="isTeamGame">
    <th mat-header-cell *matHeaderCellDef> Jeu où toutes les équipes jouent </th>
    <td mat-cell *matCellDef="let game">
      @if(game.isTeamGame) {
        <mat-icon color="primary">check</mat-icon>
      } @else {
        <mat-icon color="warn">close</mat-icon>
      }
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
