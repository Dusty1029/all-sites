<div class="table-header">
  <h2>Liste des parties</h2>
  <button mat-fab color="primary" aria-label="Ajouter joueur" (click)="onAddParty()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<table mat-table [dataSource]="parties()" class="mat-elevation-z8">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Nom </th>
    <td mat-cell *matCellDef="let player"> {{player.name}} </td>
  </ng-container>

  <ng-container matColumnDef="isFinish">
    <th mat-header-cell *matHeaderCellDef> Partie terminée </th>
    <td mat-cell *matCellDef="let party">
      @if(party.isFinish) {
        <mat-icon color="primary">check</mat-icon>
      } @else {
        <mat-icon color="warn">close</mat-icon>
      }
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let party"> 
        <button mat-fab color="primary" (click)="continueParty(party.id)">
            <mat-icon>arrow_forward</mat-icon>
        </button> 
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
